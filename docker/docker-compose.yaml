services:
  # ── Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: libra-nginx
    ports:
      - "${PORT:-2026}:2026"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    command:
      - sh
      - -c
      - |
        cp /etc/nginx/nginx.conf.template /etc/nginx/nginx.conf
        test -e /proc/net/if_inet6 || sed -i '/^[[:space:]]*listen[[:space:]]\+\[::\]:2026;/d' /etc/nginx/nginx.conf
        exec nginx -g 'daemon off;'
    depends_on:
      - frontend
      - gateway
    networks:
      - libra
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ../
      dockerfile: docker/frontend.Dockerfile
      target: dev
      args:
        PNPM_STORE_PATH: ${PNPM_STORE_PATH:-/root/.local/share/pnpm/store}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    image: libra-frontend
    container_name: libra-frontend
    command: sh -c "cd frontend && pnpm run dev > /app/logs/frontend.log 2>&1"
    volumes:
      - ../frontend/src:/app/frontend/src
      - ../frontend/public:/app/frontend/public
      - ../logs:/app/logs
    environment:
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://nginx:2026
    env_file:
      - ../frontend/.env
    networks:
      - libra
    restart: unless-stopped

  # ── Gateway ──
  gateway:
    image: libra-gateway
    build:
      context: ../
      dockerfile: docker/gateway.Dockerfile
      target: dev
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
        UV_EXTRAS: ${UV_EXTRAS:-}
    container_name: libra-gateway
    ports:
      - "8002:8002"
    volumes:
      - ../backend/:/app/backend/
      - ../config.yaml:/app/config.yaml
      - ../skills:/app/skills
      - ../logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CI=true
      - DEER_FLOW_PROJECT_ROOT=/app
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=http://localhost:8002/api
      - DEER_FLOW_CHANNELS_GATEWAY_URL=http://localhost:8002
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - libra
    restart: unless-stopped

  # ── Mermaid Render Server ──
  mermaid-server:
    build:
      context: ../
      dockerfile: docker/mermaid.Dockerfile
    image: libra-mermaid-server
    container_name: libra-mermaid-server
    networks:
      - libra
    restart: unless-stopped

  # ── MinerU 文档解析服务 ──
  mineru:
    build:
      context: ../
      dockerfile: docker/mineru.Dockerfile
    image: mineru:latest
    container_name: libra-mineru
    restart: always
    environment:
      MINERU_MODEL_SOURCE: local
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - libra

  # ── Draw.io 图表编辑器 ──
  drawio:
    image: jgraph/drawio:latest
    container_name: libra-drawio
    ports:
      - "8010:8080"
    environment:
      - ORGANIZATION_ENABLED=true
    networks:
      - libra
    restart: unless-stopped

  # ── Whisper 语音识别服务器 ──
  whisper-server:
   build:
     context: ../
     dockerfile: docker/whisper.Dockerfile
   image: libra-whisper
   container_name: libra-whisper
   runtime: nvidia
   environment:
     - WHISPER_MODEL=large-v3
     - WHISPER_DEVICE=cuda
     - WHISPER_COMPUTE_TYPE=float16
     - WHISPER_BEAM=5
     - WHISPER_LANG=zh
   volumes:
     - whisper-models:/root/.cache/faster_whisper
   ports:
     - "10300:10300"
   networks:
     - libra
   restart: unless-stopped
   deploy:
     resources:
       reservations:
         devices:
           - driver: nvidia
             count: 1
             capabilities: [gpu]

networks:
  libra:
    driver: bridge

volumes:
  whisper-models:
