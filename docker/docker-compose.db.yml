services:
  postgres:
    image: postgres:18
    container_name: deerflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: deerflow
    volumes:
      # 数据持久化：容器删了数据还在
      - deerflow-pgdata:/var/lib/postgresql/data

volumes:
  deerflow-pgdata:
